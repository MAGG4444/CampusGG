<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CampusGG Lobby</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-container">
      <header class="topbar">
        <div class="topbar-inner">
          <div class="brand">CampusGG</div>
          <nav class="nav">
            <a class="nav-link nav-link-active" href="#">Lobby</a>
            <a class="nav-link" href="#">Forum</a>
            <a class="nav-link login-button" href="#">Login</a>
          </nav>
        </div>
      </header>
      <main class="main-wrapper">
        <section class="filter-row">
          <div class="filter-group">
            <span class="filter-icon" aria-hidden="true">≡</span>
            <span class="filter-chip filter-chip-selected">All Games</span>
            <span class="filter-chip">Valorant</span>
            <span class="filter-chip">CS2</span>
            <span class="filter-chip">Overwatch 2</span>
            <span class="filter-chip">Apex</span>
          </div>
          <div class="filter-group filter-group-right">
            <span class="filter-icon" aria-hidden="true">≡</span>
            <span class="filter-chip filter-chip-selected">Most Popular</span>
            <span class="filter-chip">Beginner</span>
            <span class="filter-chip">Intermediate</span>
            <span class="filter-chip">Advanced</span>
          </div>
        </section>
        <section class="search-row">
          <div class="search-bar">
            <span class="search-icon" aria-hidden="true">⌕</span>
            <input class="search-input" type="text" placeholder="Search" />
          </div>
          <div class="action-stack">
            <label class="toggle-row">
              <span class="toggle toggle-on" aria-hidden="true">
                <span class="toggle-knob"></span>
              </span>
              <span class="toggle-label">Set Lobby as Homepage</span>
            </label>
            <button class="create-lobby-button" type="button">+ Create Lobby</button>
          </div>
        </section>
        <section class="lobby-grid">
          <article class="lobby-card">
            <div class="lobby-card-content">
              <div class="lobby-line">Lobby Name</div>
              <div class="lobby-line">User Name</div>
              <div class="lobby-line">Details</div>
            </div>
            <button class="join-button" type="button">Join Lobby</button>
          </article>
          <article class="lobby-card">
            <div class="lobby-card-content">
              <div class="lobby-line">Lobby Name</div>
              <div class="lobby-line">User Name</div>
              <div class="lobby-line">Details</div>
            </div>
            <button class="join-button" type="button">Join Lobby</button>
          </article>
          <article class="lobby-card">
            <div class="lobby-card-content">
              <div class="lobby-line">Lobby Name</div>
              <div class="lobby-line">User Name</div>
              <div class="lobby-line">Details</div>
            </div>
            <button class="join-button" type="button">Join Lobby</button>
          </article>
          <article class="lobby-card">
            <div class="lobby-card-content">
              <div class="lobby-line">Lobby Name</div>
              <div class="lobby-line">User Name</div>
              <div class="lobby-line">Details</div>
            </div>
            <button class="join-button" type="button">Join Lobby</button>
          </article>
        </section>
        <nav class="pagination" aria-label="Pagination">
          <span class="pagination-item">Previous</span>
          <span class="pagination-item">1</span>
          <span class="pagination-item">2</span>
          <span class="pagination-item">3</span>
          <span class="pagination-item">...</span>
          <span class="pagination-item">67</span>
          <span class="pagination-item">68</span>
          <span class="pagination-item">Next</span>
        </nav>
      </main>
      <div class="connection-panel">Connection</div>
      <img class="corner-logo" src="LOGO.png" alt="CampusGG logo" />
    </div>
  </body>
</html>
